version: 1
kind: command-doc-input
id: /agentdev/case-open
must_read:
  - path: docs/specs/workflows/epic-wave-model.md
    purpose: Epic/Wave/Issue 実行モデルと連結成分ベース構成生成の確認
conditional_read:
  - id: workflow-contracts
    when: ワークフロー契約（フェーズ、SSoT 遷移）参照時
    paths:
      - docs/specs/workflows/workflow-contracts.md
    purpose: パイプライン概要と共通フェーズ契約の確認
  - id: req-define-test-strategy
    when: req-define のテスト戦略セクション参照時
    paths:
      - docs/specs/commands/req-define.md
    purpose: Issue 本文の test strategy 項目構造の確認
allowed_discovery: []
forbidden:
  - "実装本文（src/opencode/**）は読まない"
read_completion: []
