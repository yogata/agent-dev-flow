version: 1
kind: command-doc-input
id: /agentdev/inspect-doc-inputs
must_read:
  - path: docs/specs/foundations/project-doc-inputs.md
    purpose: project doc-inputs 機構（config.yaml、doc-input schema、検査項目）の確認
conditional_read:
  - id: ir056
    when: IR-056 整合性ルール参照時
    paths:
      - docs/specs/integrity/rules/IR-056-project-doc-input-integrity.md
    purpose: doc-inputs 機構の strict 検査項目と exemption 仕様の確認
allowed_discovery:
  - "docs/DOC-MAP.md 経由で doc-inputs 関連 SPEC と整合性ルールを探索してよい"
  - "docs/specs/README.md 経由で SPEC status とインデックスを参照してよい"
forbidden:
  - "実装本文（src/opencode/**）は読まない"
read_completion: []
