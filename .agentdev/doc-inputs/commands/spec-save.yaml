version: 1
kind: command-doc-input
id: /agentdev/spec-save
must_read:
  - path: docs/specs/foundations/document-model.md
    purpose: SPEC 3層構造と基盤SPEC 6ドメイン分類の確認
  - path: docs/specs/foundations/patterns.md
    purpose: frontmatter、ID 体系、命名規則の確認
conditional_read: []
allowed_discovery:
  - "docs/DOC-MAP.md 経由で SPEC 配置先候補を探索してよい"
  - "docs/specs/README.md 経由で SPEC status 表と既存 SPEC 一覧を参照してよい"
  - "docs/specs/foundations/document-model.md で SPEC ドメイン分類規則を確認してよい"
forbidden:
  - "実装本文（src/opencode/**）は読まない"
read_completion:
  - "保存した SPEC が docs/specs/README.md のインデックスに存在すること"
