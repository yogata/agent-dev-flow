version: 1
kind: command-doc-input
id: /agentdev/inspect-docs
must_read:
  - path: docs/specs/foundations/document-model.md
    purpose: REQ/ADR/SPEC/guides/DOC-MAP の責務マトリックスと探索入口の確認
conditional_read:
  - id: docs-spec-rebuild-integrity
    when: 配布物整合性ルール参照時
    paths:
      - docs/specs/integrity/docs-spec-rebuild-integrity.md
    purpose: 配布物 ID 除去後の品質保持ルールの確認
allowed_discovery:
  - "docs/DOC-MAP.md 経由で診断対象 SPEC と文書群を探索してよい"
  - "docs/specs/README.md 経由で SPEC status とインデックスを参照してよい"
forbidden:
  - "実装本文（src/opencode/**）は読まない"
read_completion: []
