version: 1
kind: skill-doc-input
id: agentdev-req-analysis
conditional_read:
  - id: req-health-metrics
    when: REQ 健全性メトリクス参照時
    paths:
      - docs/specs/quality/req-health-metrics.md
    purpose: 要件分析品質基準と定量閾値の確認
  - id: document-model
    when: 文書モデル参照時
    paths:
      - docs/specs/foundations/document-model.md
    purpose: REQ/ADR/SPEC 責務マトリックスの確認
  - id: req-impact-map
    when: REQ 影響マップ参照時
    paths:
      - docs/specs/responsibilities/req-impact-map.md
    purpose: REQ → 影響するルール/アーティファクト対応表の確認
allowed_discovery: []
forbidden:
  - "実装本文（src/opencode/**）は読まない"
