version: 1
kind: skill-doc-input
id: agentdev-quality-gates
conditional_read:
  - id: quality-gates
    when: QG-1〜QG-4 品質ゲート参照時
    paths:
      - docs/specs/quality/quality-gates.md
    purpose: 品質ゲート定義と機械化境界の確認
  - id: document-model
    when: 文書モデル参照時
    paths:
      - docs/specs/foundations/document-model.md
    purpose: REQ/ADR/SPEC 責務マトリックスの確認
  - id: req-health-metrics
    when: REQ 健全性メトリクス参照時
    paths:
      - docs/specs/quality/req-health-metrics.md
    purpose: REQ 肥大化・関心ズレ検出の定量閾値確認
allowed_discovery: []
forbidden:
  - "実装本文（src/opencode/**）は読まない"
