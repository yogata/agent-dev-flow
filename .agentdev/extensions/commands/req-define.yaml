version: 1
kind: command-extension
id: /agentdev/req-define

context:
  - id: must-1
    paths:
      - "docs/specs/foundations/document-model.md"
    purpose: "REQ/ADR/SPEC/guides/DOC-MAP の責務マトリックスと文書間関係の確認"
  - id: must-2
    paths:
      - docs/specs/foundations/patterns.md
    purpose: frontmatter、ID 体系、命名規則、URL 参照形式の確認
  - id: must-3
    paths:
      - "docs/specs/quality/req-health-metrics.md"
    purpose: REQ 健全性メトリクス（肥大化、関心ズレ検出）の確認
  - id: delegation-contracts
    when: サブエージェント委譲契約参照時
    paths:
      - "docs/specs/workflows/delegation-contracts.md"
    purpose: 委譲時最小契約と制約の確認
  - id: epic-wave-model
    when: Epic/Wave 構成参照時
    paths:
      - "docs/specs/workflows/epic-wave-model.md"
    purpose: OU 階層と Wave スケジューリングの確認
  - id: workflow-contracts
    when: ワークフロー契約（フェーズ、SSoT 遷移）参照時
    paths:
      - "docs/specs/workflows/workflow-contracts.md"
    purpose: パイプライン概要と共通フェーズ契約の確認
  - id: req-file-manager-procedure
    when: REQ ファイル管理手順参照時
    paths:
      - "docs/specs/skills/agentdev-req-file-manager.md"
    purpose: REQ 番号採番と CREATE/APPEND/UPDATE 判定の確認
  - id: discovery-1
    purpose: "docs/DOC-MAP.md 経由で関連 SPEC を探索してよい"
  - id: discovery-2
    purpose: docs/specs/README.md 経由で SPEC 一覧と status を参照してよい

rules: []

checks: []

acceptance_gates:
  - "要件doc（draft）が .agentdev/drafts/req-draft-*.md に存在すること"

must_not:
  - 実装本文（src/opencode/**）は読まない
