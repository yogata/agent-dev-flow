version: 1
kind: command-extension
id: /agentdev/spec-save

context:
  - id: must-1
    paths:
      - "docs/specs/foundations/document-model.md"
    purpose: SPEC 3層構造と基盤SPEC 6ドメイン分類の確認
  - id: must-2
    paths:
      - docs/specs/foundations/patterns.md
    purpose: frontmatter、ID 体系、命名規則の確認
  - id: discovery-1
    purpose: "docs/DOC-MAP.md 経由で SPEC 配置先候補を探索してよい"
  - id: discovery-2
    purpose: docs/specs/README.md 経由で SPEC status 表と既存 SPEC 一覧を参照してよい
  - id: discovery-3
    purpose: "docs/specs/foundations/document-model.md で SPEC ドメイン分類規則を確認してよい"

rules: []

checks: []

acceptance_gates:
  - 保存した SPEC が docs/specs/README.md のインデックスに存在すること

must_not:
  - 実装本文（src/opencode/**）は読まない
